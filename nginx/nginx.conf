events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server_tokens off;
    resolver 127.0.0.11 valid=5s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 8088;
        listen 8443 ssl http2;
        server_name localhost;
        absolute_redirect off;

        ssl_certificate /etc/nginx/tls/localhost.crt;
        ssl_certificate_key /etc/nginx/tls/localhost.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:ftds_ssl:10m;
        ssl_session_timeout 10m;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self' https://cdn.jsdelivr.net; img-src 'self' data: https:; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; connect-src 'self' https://cdn.jsdelivr.net http://localhost https://localhost ws://localhost wss://localhost http://127.0.0.1 https://127.0.0.1 ws://127.0.0.1 wss://127.0.0.1 http://localhost:* https://localhost:* ws://localhost:* wss://localhost:* http://127.0.0.1:* https://127.0.0.1:* ws://127.0.0.1:* wss://127.0.0.1:*; frame-ancestors 'none'; base-uri 'self';" always;

        location = /__auth/fraud_staff {
            internal;
            proxy_pass http://gateway:8004/internal/staff/authorize?roles=fraud_analyst,fraud_manager;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
        }

        location = /__auth/manager_staff {
            internal;
            proxy_pass http://gateway:8004/internal/staff/authorize?roles=fraud_manager,ops_readonly,ops_admin;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
        }

        location @staff_login {
            return 302 /staff-sign-in?redirect=$request_uri;
        }

        location = /staff-sign-in {
            return 302 /staff-login.html$is_args$args;
        }

        location = /banking {
            return 302 /banking.html$is_args$args;
        }

        location = /fraud-review {
            return 302 /fraud-review.html$is_args$args;
        }

        location = /manager {
            return 302 /manager.html$is_args$args;
        }

        location = /forbidden {
            return 302 /forbidden.html$is_args$args;
        }

        location = /staff-login.html {
            root /usr/share/nginx/html;
            try_files /staff-login.html =404;
        }

        location = /forbidden.html {
            root /usr/share/nginx/html;
            try_files /forbidden.html =404;
        }

        location = /fraud-review.html {
            auth_request /__auth/fraud_staff;
            error_page 401 = @staff_login;
            error_page 403 = /forbidden.html;
            root /usr/share/nginx/html;
            try_files /fraud-review.html =404;
        }

        location = /manager.html {
            auth_request /__auth/manager_staff;
            error_page 401 = @staff_login;
            error_page 403 = /forbidden.html;
            root /usr/share/nginx/html;
            try_files /manager.html =404;
        }

        location /api/auth/ {
            set $upstream http://customer:8005;
            rewrite ^/api/auth/(.*)$ /$1 break;
            proxy_pass $upstream;
        }

        location /api/staff/ {
            set $upstream http://gateway:8004;
            rewrite ^/api/staff/(.*)$ /staff/$1 break;
            proxy_pass $upstream;
        }

        location /api/v1/ {
            proxy_pass http://gateway:8004;
        }

        location /api/ {
            set $upstream http://gateway:8004;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass $upstream;
        }

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            index index.html;
        }
    }

    server {
        listen 3000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        location = /__auth/ops_read {
            internal;
            proxy_pass http://gateway:8004/internal/staff/authorize?roles=ops_readonly,ops_admin;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
        }

        location @ops_login {
            return 302 https://$host/staff-sign-in?redirect=$scheme://$host:$server_port$request_uri;
        }

        location @ops_forbidden {
            return 302 https://$host/forbidden.html;
        }

        location / {
            auth_request /__auth/ops_read;
            error_page 401 = @ops_login;
            error_page 403 = @ops_forbidden;
            proxy_pass http://grafana:3000;
        }
    }

    server {
        listen 16686;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location = /__auth/ops_read {
            internal;
            proxy_pass http://gateway:8004/internal/staff/authorize?roles=ops_readonly,ops_admin;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
        }

        location @ops_login {
            return 302 https://$host/staff-sign-in?redirect=$scheme://$host:$server_port$request_uri;
        }

        location @ops_forbidden {
            return 302 https://$host/forbidden.html;
        }

        location / {
            auth_request /__auth/ops_read;
            error_page 401 = @ops_login;
            error_page 403 = @ops_forbidden;
            proxy_pass http://jaeger:16686;
        }
    }

    server {
        listen 9090;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location = /__auth/ops_read {
            internal;
            proxy_pass http://gateway:8004/internal/staff/authorize?roles=ops_readonly,ops_admin;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
        }

        location @ops_login {
            return 302 https://$host/staff-sign-in?redirect=$scheme://$host:$server_port$request_uri;
        }

        location @ops_forbidden {
            return 302 https://$host/forbidden.html;
        }

        location / {
            auth_request /__auth/ops_read;
            error_page 401 = @ops_login;
            error_page 403 = @ops_forbidden;
            proxy_pass http://prometheus:9090;
        }
    }

    server {
        listen 9091;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location = /__auth/ops_read {
            internal;
            proxy_pass http://gateway:8004/internal/staff/authorize?roles=ops_readonly,ops_admin;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
        }

        location @ops_login {
            return 302 https://$host/staff-sign-in?redirect=$scheme://$host:$server_port$request_uri;
        }

        location @ops_forbidden {
            return 302 https://$host/forbidden.html;
        }

        location / {
            auth_request /__auth/ops_read;
            error_page 401 = @ops_login;
            error_page 403 = @ops_forbidden;
            proxy_pass http://cadvisor:8080;
        }
    }

    server {
        listen 8025;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location = /__auth/ops_admin {
            internal;
            proxy_pass http://gateway:8004/internal/staff/authorize?roles=ops_admin;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
        }

        location @ops_login {
            return 302 https://$host/staff-sign-in?redirect=$scheme://$host:$server_port$request_uri;
        }

        location @ops_forbidden {
            return 302 https://$host/forbidden.html;
        }

        location / {
            auth_request /__auth/ops_admin;
            error_page 401 = @ops_login;
            error_page 403 = @ops_forbidden;
            proxy_pass http://mailpit:8025;
        }
    }
}

