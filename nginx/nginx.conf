events {
    worker_connections 1024;
}

http {
    # Hide Nginx version from error pages and headers
    server_tokens off;

    # Use Docker's embedded DNS so nginx re-resolves upstreams dynamically.
    # The resolver directive only takes effect when proxy_pass uses a variable
    # (set $upstream ...), which is why named upstream blocks were replaced below.
    resolver 127.0.0.11 valid=5s ipv6=off;

    server {
        listen 8088;

        # Forward real client IP
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ---------------------------------------------------------------
        # Customer auth routes  →  customer service
        # /api/auth/register  →  http://customer:8005/register
        # /api/auth/login     →  http://customer:8005/login
        # NOTE: set must come before rewrite...break to avoid empty variable
        # ---------------------------------------------------------------
        location /api/auth/ {
            set $upstream http://customer:8005;
            rewrite ^/api/auth/(.*)$ /$1 break;
            proxy_pass $upstream;
        }

        # ---------------------------------------------------------------
        # Customer profile routes  →  customer service
        # /api/customers/me   →  http://customer:8005/me
        # ---------------------------------------------------------------
        location /api/customers/ {
            set $upstream http://customer:8005;
            rewrite ^/api/customers/(.*)$ /$1 break;
            proxy_pass $upstream;
        }

        # ---------------------------------------------------------------
        # Fraud Review API  →  process_flagged_appeals service
        # ---------------------------------------------------------------
        location /api/fraud-review/ {
            set $upstream http://fraud-review:8002;
            rewrite ^/api/fraud-review/(.*)$ /$1 break;
            proxy_pass $upstream;
        }

        # ---------------------------------------------------------------
        # Analytics API  →  analytics service
        # ---------------------------------------------------------------
        location /api/analytics/ {
            set $upstream http://analytics:8006;
            rewrite ^/api/analytics/(.*)$ /$1 break;
            proxy_pass $upstream;
        }

        # ---------------------------------------------------------------
        # All other /api/ routes  →  Python gateway (BFF)
        # /api/customer/transactions  →  http://gateway:8004/customer/transactions
        # /api/fraud/flagged          →  http://gateway:8004/fraud/flagged
        # ---------------------------------------------------------------
        location /api/ {
            set $upstream http://gateway:8004;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass $upstream;
        }

        # ---------------------------------------------------------------
        # Customer Banking UI  →  static HTML files
        # ---------------------------------------------------------------
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            index index.html;
        }
    }
}
