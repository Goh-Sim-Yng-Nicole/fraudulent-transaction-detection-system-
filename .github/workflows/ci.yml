name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Docker Integration Validation
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      contents: read

    env:
      COMPOSE_DOCKER_CLI_BUILD: '1'
      DOCKER_BUILDKIT: '1'

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Prepare CI environment file
        run: cp .env.example .env

      - name: Install root quality tooling
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run code quality gates
        run: npm run quality

      - name: Run unit tests
        run: npm run test:unit

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Validate Docker Compose configuration
        run: docker compose config -q

      - name: Build application stack
        run: docker compose build --parallel

      - name: Start application stack
        run: docker compose up -d --remove-orphans

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Run service contract tests
        run: npm run test:contracts

      - name: Run end-to-end tests
        run: npm run test:e2e

      - name: Run user journey tests
        run: npm run test:journey

      - name: Capture container state
        if: always()
        run: docker compose ps

      - name: Export Docker logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=300 > ci-docker-logs.txt

      - name: Upload Docker logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-docker-logs
          path: ci-docker-logs.txt
          if-no-files-found: ignore

      - name: Tear down stack
        if: always()
        run: docker compose down -v --remove-orphans
