<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FTDS | Access Denied</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(248, 113, 113, 0.12), transparent 30%),
        linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
      display: grid;
      place-items: center;
      padding: 1.5rem;
    }

    .card-shell {
      width: min(760px, 100%);
      border: none;
      border-radius: 28px;
      box-shadow: 0 28px 80px rgba(15, 23, 42, 0.12);
      overflow: hidden;
    }

    .summary-box {
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 18px;
      background: #f8fafc;
    }

    .action-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="card card-shell">
    <div class="card-body p-4 p-lg-5">
      <div class="text-center mb-4">
        <div class="display-4 text-danger mb-3">403</div>
        <h1 class="h3 fw-bold mb-2">This page is outside your role</h1>
        <p class="text-muted mb-0">
          You are signed in successfully, but the surface you opened is reserved for a different staff role.
        </p>
      </div>

      <div class="summary-box p-4 mb-4">
        <div class="small text-uppercase text-muted fw-semibold mb-2">Signed-in role</div>
        <div class="d-flex align-items-center gap-2 mb-2">
          <i class="bi bi-person-badge-fill text-primary"></i>
          <div class="fw-bold" id="roleLabel">Checking session...</div>
        </div>
        <div class="text-muted" id="roleHelp">Loading the destinations this account can access.</div>
      </div>

      <div class="small text-uppercase text-muted fw-semibold mb-2">Available surfaces for this role</div>
      <div class="action-grid mb-4" id="actions"></div>

      <div class="d-flex flex-wrap gap-2">
        <a href="/staff-login.html" class="btn btn-outline-secondary">Switch account</a>
        <a href="/staff-login.html" class="btn btn-link text-decoration-none px-0">Back to sign in</a>
      </div>
    </div>
  </div>

  <script>
    const roleViews = {
      fraud_analyst: {
        label: 'Fraud Analyst',
        help: 'You can work flagged cases and appeals in the fraud review console.',
        actions: [
          { label: 'Open fraud review', href: '/fraud-review.html', style: 'btn-primary' },
        ],
      },
      fraud_manager: {
        label: 'Fraud Manager',
        help: 'You can work review operations and open the manager dashboard.',
        actions: [
          { label: 'Open fraud review', href: '/fraud-review.html', style: 'btn-outline-primary' },
          { label: 'Open manager dashboard', href: '/manager.html', style: 'btn-primary' },
        ],
      },
      ops_readonly: {
        label: 'Ops Readonly',
        help: 'You can use the manager dashboard and read-only observability tools.',
        actions: [
          { label: 'Open manager dashboard', href: '/manager.html', style: 'btn-primary' },
          { label: 'Open Grafana', href: 'http://localhost:3000', style: 'btn-outline-primary' },
          { label: 'Open Jaeger', href: 'http://localhost:16686', style: 'btn-outline-primary' },
          { label: 'Open Prometheus', href: 'http://localhost:9090', style: 'btn-outline-primary' },
          { label: 'Open cAdvisor', href: 'http://localhost:9091', style: 'btn-outline-primary' },
        ],
      },
      ops_admin: {
        label: 'Ops Admin',
        help: 'You can use the manager dashboard, observability stack, and Mailpit.',
        actions: [
          { label: 'Open manager dashboard', href: '/manager.html', style: 'btn-primary' },
          { label: 'Open Grafana', href: 'http://localhost:3000', style: 'btn-outline-primary' },
          { label: 'Open Jaeger', href: 'http://localhost:16686', style: 'btn-outline-primary' },
          { label: 'Open Prometheus', href: 'http://localhost:9090', style: 'btn-outline-primary' },
          { label: 'Open cAdvisor', href: 'http://localhost:9091', style: 'btn-outline-primary' },
          { label: 'Open Mailpit', href: 'http://localhost:8025', style: 'btn-outline-primary' },
        ],
      },
    };

    const renderActions = (actions) => {
      const container = document.getElementById('actions');
      container.innerHTML = '';

      for (const action of actions) {
        const anchor = document.createElement('a');
        anchor.href = action.href;
        anchor.className = `btn ${action.style}`;
        anchor.textContent = action.label;
        container.appendChild(anchor);
      }
    };

    const applyRoleView = (role) => {
      const view = roleViews[role] || {
        label: 'Unknown role',
        help: 'We could not match this session to a known staff role. Try signing in again.',
        actions: [{ label: 'Back to sign in', href: '/staff-login.html', style: 'btn-primary' }],
      };

      document.getElementById('roleLabel').textContent = view.label;
      document.getElementById('roleHelp').textContent = view.help;
      renderActions(view.actions);
    };

    const bootstrap = async () => {
      try {
        const response = await fetch('/api/staff/me', { credentials: 'same-origin' });
        if (!response.ok) {
          window.location.href = '/staff-login.html';
          return;
        }

        const payload = await response.json();
        applyRoleView(payload.user?.role);
      } catch (_error) {
        window.location.href = '/staff-login.html';
      }
    };

    bootstrap();
  </script>
</body>
</html>
