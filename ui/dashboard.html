<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FTDS – Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body { background: #f0f4f8; }
    .navbar { background: linear-gradient(135deg, #1a56db 0%, #0e3a8c 100%); }
    .navbar-brand { font-weight: 700; font-size: 1.2rem; letter-spacing: -.3px; }
    .card { border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.07); border: none; }
    .card-header { background: #fff; border-bottom: 1px solid #e9ecef; border-radius: 12px 12px 0 0 !important; font-weight: 600; }
    .txn-row { cursor: pointer; transition: background .15s; }
    .txn-row:hover { background: #f8faff; }
    .badge-PENDING    { background-color: #e0a820; }
    .badge-APPROVED   { background-color: #0e7f4e; }
    .badge-REJECTED   { background-color: #c0392b; }
    .badge-FLAGGED    { background-color: #d97706; }
    .badge-RESOLVED   { background-color: #0891b2; }
    .score-bar { height: 8px; border-radius: 4px; background: #e9ecef; }
    .score-fill { height: 8px; border-radius: 4px; background: linear-gradient(90deg, #22c55e, #f59e0b, #ef4444); }
    .section-title { font-size: 1rem; font-weight: 700; color: #374151; margin-bottom: 1rem; }
    .empty-state { text-align: center; color: #9ca3af; padding: 3rem 0; }
    .empty-state i { font-size: 2.5rem; display: block; margin-bottom: .5rem; }
    .poll-indicator { font-size: .78rem; color: #6b7280; }
    #toastContainer { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-3 py-2">
  <span class="navbar-brand"><i class="bi bi-shield-check me-2"></i>FTDS Banking</span>
  <div class="d-flex align-items-center gap-3">
    <span class="text-white-50 small" id="navEmail"></span>
    <span class="text-white fw-semibold" id="navName"></span>
    <button class="btn btn-sm btn-outline-light" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
  </div>
</nav>

<div class="container-fluid py-4 px-4">
  <div class="row g-4">

    <!-- LEFT: Submit Transaction -->
    <div class="col-lg-4">
      <div class="card">
        <div class="card-header py-3"><i class="bi bi-send me-2 text-primary"></i>New Transaction</div>
        <div class="card-body">
          <div id="txnAlert" class="alert d-none" role="alert"></div>
          <form id="txnForm">
            <div class="mb-3">
              <label class="form-label fw-semibold small">Amount</label>
              <div class="input-group">
                <span class="input-group-text">$</span>
                <input type="number" class="form-control" id="txnAmount" min="0.01" step="0.01" placeholder="0.00" required />
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold small">Currency</label>
              <select class="form-select" id="txnCurrency">
                <option value="SGD" selected>SGD – Singapore Dollar</option>
                <option value="USD">USD – US Dollar</option>
                <option value="EUR">EUR – Euro</option>
                <option value="GBP">GBP – British Pound</option>
                <option value="MYR">MYR – Malaysian Ringgit</option>
                <option value="CNY">CNY – Chinese Yuan</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold small">Card Type</label>
              <select class="form-select" id="txnCardType">
                <option value="CREDIT" selected>Credit</option>
                <option value="DEBIT">Debit</option>
                <option value="PREPAID">Prepaid</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold small">Country</label>
              <select class="form-select" id="txnCountry">
                <option value="SG" selected>Singapore (SG)</option>
                <option value="US">United States (US)</option>
                <option value="MY">Malaysia (MY)</option>
                <option value="CN">China (CN)</option>
                <option value="NG">Nigeria (NG)</option>
                <option value="RU">Russia (RU)</option>
                <option value="ID">Indonesia (ID)</option>
                <option value="IN">India (IN)</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold small">Merchant ID</label>
              <input type="text" class="form-control" id="txnMerchant" placeholder="e.g. GRAB_SG_001" required />
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold small">Hour (UTC 0–23)</label>
              <input type="number" class="form-control" id="txnHour" min="0" max="23"
                     value="" placeholder="e.g. 14" required />
              <div class="form-text">Current UTC hour: <strong id="currentHour">–</strong></div>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-semibold" id="txnSubmitBtn">
              <span class="spinner-border spinner-border-sm d-none me-2" id="txnSpinner"></span>
              <i class="bi bi-send me-1"></i>Submit Transaction
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- RIGHT: Transaction List -->
    <div class="col-lg-8">
      <div class="card">
        <div class="card-header py-3 d-flex justify-content-between align-items-center">
          <span><i class="bi bi-list-ul me-2 text-primary"></i>My Transactions</span>
          <div class="d-flex align-items-center gap-2">
            <span class="poll-indicator" id="pollStatus">🔄 auto-refresh on</span>
            <button class="btn btn-sm btn-outline-secondary" onclick="loadTransactions()">
              <i class="bi bi-arrow-clockwise"></i> Refresh
            </button>
          </div>
        </div>
        <div class="card-body p-0">
          <div id="txnList">
            <div class="empty-state">
              <i class="bi bi-inbox"></i>Loading your transactions…
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- TRANSACTION DETAIL MODAL -->
<div class="modal fade" id="txnDetailModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content" style="border-radius:12px">
      <div class="modal-header" style="background:#f8faff; border-radius:12px 12px 0 0">
        <h5 class="modal-title fw-bold"><i class="bi bi-receipt me-2"></i>Transaction Detail</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="txnDetailBody">Loading…</div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button class="btn btn-warning fw-semibold d-none" id="openAppealBtn" onclick="openAppeal()">
          <i class="bi bi-flag me-1"></i>Submit Appeal
        </button>
      </div>
    </div>
  </div>
</div>

<!-- APPEAL MODAL -->
<div class="modal fade" id="appealModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content" style="border-radius:12px">
      <div class="modal-header">
        <h5 class="modal-title fw-bold"><i class="bi bi-flag me-2"></i>Submit Appeal</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="text-muted small mb-3">Explain why you believe this transaction decision should be reviewed.</p>
        <div id="appealAlert" class="alert d-none" role="alert"></div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Transaction ID</label>
          <input type="text" class="form-control" id="appealTxnId" readonly />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Reason for Appeal</label>
          <textarea class="form-control" id="appealReason" rows="4"
                    placeholder="Describe why you are appealing this decision…" required></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-warning fw-semibold" id="appealSubmitBtn" onclick="submitAppeal()">
          <span class="spinner-border spinner-border-sm d-none me-2" id="appealSpinner"></span>
          Submit Appeal
        </button>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const API = '/api';
  let customer = null;
  let token = null;
  let pollInterval = null;
  let selectedTxnId = null;

  // ── Auth guard ──────────────────────────────────────────────────
  token = localStorage.getItem('ftds_token');
  customer = JSON.parse(localStorage.getItem('ftds_customer') || 'null');
  if (!token || !customer) { window.location.href = 'index.html'; }

  document.getElementById('navName').textContent = customer.full_name;
  document.getElementById('navEmail').textContent = customer.email;

  // Set current UTC hour as default
  const nowHour = new Date().getUTCHours();
  document.getElementById('currentHour').textContent = nowHour;
  document.getElementById('txnHour').value = nowHour;

  function logout() {
    localStorage.removeItem('ftds_token');
    localStorage.removeItem('ftds_customer');
    window.location.href = 'index.html';
  }

  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
  }

  // ── Toast helper ────────────────────────────────────────────────
  function showToast(msg, type = 'success') {
    const id = 'toast_' + Date.now();
    const icons = { success: 'check-circle-fill text-success', danger: 'x-circle-fill text-danger', warning: 'exclamation-triangle-fill text-warning' };
    document.getElementById('toastContainer').insertAdjacentHTML('beforeend', `
      <div id="${id}" class="toast align-items-center border-0 mb-2" role="alert">
        <div class="d-flex">
          <div class="toast-body d-flex align-items-center gap-2">
            <i class="bi bi-${icons[type] || icons.success}"></i>${msg}
          </div>
          <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
      </div>`);
    const el = document.getElementById(id);
    new bootstrap.Toast(el, { delay: 4000 }).show();
    el.addEventListener('hidden.bs.toast', () => el.remove());
  }

  // ── Status badge ────────────────────────────────────────────────
  function statusBadge(status) {
    const icons = {
      PENDING: 'hourglass-split', APPROVED: 'check-circle-fill',
      REJECTED: 'x-circle-fill', FLAGGED: 'exclamation-triangle-fill', RESOLVED: 'patch-check-fill'
    };
    return `<span class="badge badge-${status} text-white px-2 py-1">
              <i class="bi bi-${icons[status] || 'circle'} me-1"></i>${status}
            </span>`;
  }

  // ── Load transactions ────────────────────────────────────────────
  async function loadTransactions() {
    try {
      const res = await fetch(`${API}/customer/transactions?customer_id=${customer.customer_id}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.status === 401) { logout(); return; }
      const data = await res.json();
      renderTransactions(Array.isArray(data) ? data : []);
    } catch (err) {
      console.error('loadTransactions error:', err);
    }
  }

  function renderTransactions(list) {
    const container = document.getElementById('txnList');
    if (!list.length) {
      container.innerHTML = `<div class="empty-state"><i class="bi bi-inbox"></i>No transactions yet. Submit your first transaction!</div>`;
      return;
    }
    container.innerHTML = `
      <div class="table-responsive">
        <table class="table table-hover mb-0 align-middle">
          <thead class="table-light">
            <tr>
              <th class="ps-3">Transaction ID</th>
              <th>Amount</th>
              <th>Merchant</th>
              <th>Status</th>
              <th>Fraud Score</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody>
            ${list.map(t => `
              <tr class="txn-row" onclick="viewTransaction('${t.transaction_id}')">
                <td class="ps-3 font-monospace small">${t.transaction_id.slice(0, 8)}…</td>
                <td class="fw-semibold">${t.currency} ${Number(t.amount).toFixed(2)}</td>
                <td class="text-muted small">${t.merchant_id}</td>
                <td>${statusBadge(t.status)}</td>
                <td>
                  ${t.fraud_score !== null
                    ? `<div class="d-flex align-items-center gap-2">
                        <div class="score-bar flex-grow-1"><div class="score-fill" style="width:${t.fraud_score}%"></div></div>
                        <span class="small fw-semibold">${t.fraud_score}</span>
                       </div>`
                    : '<span class="text-muted small">Pending…</span>'}
                </td>
                <td class="text-muted small">${new Date(t.created_at).toLocaleString()}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  // ── View transaction detail ──────────────────────────────────────
  async function viewTransaction(txnId) {
    selectedTxnId = txnId;
    const modal = new bootstrap.Modal(document.getElementById('txnDetailModal'));
    document.getElementById('txnDetailBody').innerHTML = '<div class="text-center py-4"><div class="spinner-border text-primary"></div></div>';
    document.getElementById('openAppealBtn').classList.add('d-none');
    modal.show();

    try {
      const [txnRes, decRes] = await Promise.all([
        fetch(`${API}/customer/transactions/${txnId}`, { headers: { 'Authorization': `Bearer ${token}` } }),
        fetch(`${API}/customer/transactions/${txnId}/decision`, { headers: { 'Authorization': `Bearer ${token}` } }),
      ]);
      const txn = await txnRes.json();
      const dec = await decRes.json();

      const canAppeal = ['FLAGGED', 'REJECTED'].includes(txn.status);
      if (canAppeal) document.getElementById('openAppealBtn').classList.remove('d-none');

      const scoreHtml = dec.fraud_score !== null
        ? `<div class="score-bar mb-1"><div class="score-fill" style="width:${dec.fraud_score}%"></div></div>
           <div class="small text-muted">${dec.fraud_score}/100 — ${riskLabel(dec.fraud_score)}</div>`
        : '<span class="text-muted">Not scored yet</span>';

      document.getElementById('txnDetailBody').innerHTML = `
        <div class="row g-3">
          <div class="col-md-6">
            <div class="p-3 bg-light rounded">
              <div class="small text-muted mb-2 fw-semibold text-uppercase">Transaction Info</div>
              <table class="table table-sm table-borderless mb-0 small">
                <tr><td class="text-muted">ID</td><td class="font-monospace">${txn.transaction_id}</td></tr>
                <tr><td class="text-muted">Amount</td><td class="fw-semibold">${txn.currency} ${Number(txn.amount).toFixed(2)}</td></tr>
                <tr><td class="text-muted">Card</td><td>${txn.card_type}</td></tr>
                <tr><td class="text-muted">Country</td><td>${txn.country}</td></tr>
                <tr><td class="text-muted">Merchant</td><td>${txn.merchant_id}</td></tr>
                <tr><td class="text-muted">Hour (UTC)</td><td>${txn.hour_utc}:00</td></tr>
                <tr><td class="text-muted">Submitted</td><td>${new Date(txn.created_at).toLocaleString()}</td></tr>
                <tr><td class="text-muted">Updated</td><td>${new Date(txn.updated_at).toLocaleString()}</td></tr>
              </table>
            </div>
          </div>
          <div class="col-md-6">
            <div class="p-3 bg-light rounded mb-3">
              <div class="small text-muted mb-2 fw-semibold text-uppercase">Decision</div>
              <div class="mb-2">${statusBadge(txn.status)}</div>
              ${scoreHtml}
              ${dec.outcome_reason
                ? `<div class="mt-2 p-2 border-start border-3 border-warning bg-white rounded small">
                     <i class="bi bi-info-circle me-1 text-warning"></i>${dec.outcome_reason}
                   </div>`
                : ''}
            </div>
            ${canAppeal ? `
              <div class="alert alert-warning py-2 small mb-0">
                <i class="bi bi-exclamation-triangle me-1"></i>
                You may appeal this decision using the button below.
              </div>` : ''}
          </div>
        </div>`;
    } catch (err) {
      document.getElementById('txnDetailBody').innerHTML = `<div class="alert alert-danger">Failed to load: ${err.message}</div>`;
    }
  }

  function riskLabel(score) {
    if (score <= 30) return '🟢 Low risk';
    if (score <= 60) return '🟡 Medium risk';
    if (score <= 80) return '🟠 High risk';
    return '🔴 Very high risk';
  }

  // ── Open appeal modal ────────────────────────────────────────────
  function openAppeal() {
    bootstrap.Modal.getInstance(document.getElementById('txnDetailModal')).hide();
    document.getElementById('appealTxnId').value = selectedTxnId;
    document.getElementById('appealReason').value = '';
    document.getElementById('appealAlert').className = 'alert d-none';
    new bootstrap.Modal(document.getElementById('appealModal')).show();
  }

  // ── Submit appeal ────────────────────────────────────────────────
  async function submitAppeal() {
    const reason = document.getElementById('appealReason').value.trim();
    if (!reason) {
      document.getElementById('appealAlert').className = 'alert alert-danger';
      document.getElementById('appealAlert').textContent = 'Please provide a reason for your appeal.';
      return;
    }
    const spinner = document.getElementById('appealSpinner');
    spinner.classList.remove('d-none');
    document.getElementById('appealSubmitBtn').disabled = true;
    try {
      const res = await fetch(`${API}/customer/appeals`, {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({
          transaction_id: selectedTxnId,
          reason_for_appeal: reason,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Appeal submission failed');
      bootstrap.Modal.getInstance(document.getElementById('appealModal')).hide();
      showToast('Appeal submitted successfully!');
      await loadTransactions();
    } catch (err) {
      document.getElementById('appealAlert').className = 'alert alert-danger';
      document.getElementById('appealAlert').textContent = err.message;
    } finally {
      spinner.classList.add('d-none');
      document.getElementById('appealSubmitBtn').disabled = false;
    }
  }

  // ── Submit transaction ───────────────────────────────────────────
  document.getElementById('txnForm').addEventListener('submit', async e => {
    e.preventDefault();
    const alert = document.getElementById('txnAlert');
    alert.className = 'alert d-none';
    const spinner = document.getElementById('txnSpinner');
    spinner.classList.remove('d-none');
    document.getElementById('txnSubmitBtn').disabled = true;

    try {
      const res = await fetch(`${API}/customer/transactions`, {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({
          amount: parseFloat(document.getElementById('txnAmount').value),
          currency: document.getElementById('txnCurrency').value,
          card_type: document.getElementById('txnCardType').value,
          country: document.getElementById('txnCountry').value,
          merchant_id: document.getElementById('txnMerchant').value,
          hour_utc: parseInt(document.getElementById('txnHour').value),
          customer_id: customer.customer_id,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(JSON.stringify(data.detail) || 'Submission failed');
      showToast(`Transaction submitted! ID: ${data.transaction_id.slice(0,8)}…`);
      document.getElementById('txnForm').reset();
      document.getElementById('txnHour').value = new Date().getUTCHours();
      await loadTransactions();
    } catch (err) {
      alert.className = 'alert alert-danger';
      alert.textContent = err.message;
    } finally {
      spinner.classList.add('d-none');
      document.getElementById('txnSubmitBtn').disabled = false;
    }
  });

  // ── Auto-poll every 4s for status updates on pending transactions ─
  function startPolling() {
    pollInterval = setInterval(async () => {
      const rows = document.querySelectorAll('.txn-row');
      const hasPending = Array.from(rows).some(r => r.textContent.includes('PENDING') || r.textContent.includes('FLAGGED'));
      if (hasPending) await loadTransactions();
    }, 4000);
  }

  // ── Init ─────────────────────────────────────────────────────────
  loadTransactions();
  startPolling();
</script>
</body>
</html>
