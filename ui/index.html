<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FTDS | Login & Register</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' fill='%231a56db' viewBox='0 0 16 16'><path fill-rule='evenodd' d='M8 0c-.69 0-1.843.265-2.928.56-1.11.3-2.229.655-2.887.87a1.54 1.54 0 0 0-1.044 1.262c-.596 4.477.787 7.795 2.465 9.99a11.8 11.8 0 0 0 2.517 2.453c.386.273.744.482 1.048.625.28.132.581.24.829.24s.548-.108.829-.24a7 7 0 0 0 1.048-.625 11.8 11.8 0 0 0 2.517-2.453c1.678-2.195 3.061-5.513 2.465-9.99a1.54 1.54 0 0 0-1.044-1.263 62.5 62.5 0 0 0-2.887-.87C9.843.266 8.69 0 8 0m0 5a1.5 1.5 0 0 1 .5 2.915l.385 1.99a.5.5 0 0 1-.491.595h-.788a.5.5 0 0 1-.49-.595l.384-1.99A1.5 1.5 0 0 1 8 5'/></svg>" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body { background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .auth-card { width: 100%; max-width: 460px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,.12); }
    .brand-header { background: linear-gradient(135deg, #1a56db 0%, #0e3a8c 100%); border-radius: 16px 16px 0 0; padding: 2rem; color: #fff; text-align: center; }
    .brand-header h1 { font-size: 1.6rem; font-weight: 700; margin: 0; letter-spacing: -.5px; }
    .brand-header p { margin: .3rem 0 0; opacity: .8; font-size: .9rem; }
    .nav-tabs .nav-link { font-weight: 600; color: #6b7280; }
    .nav-tabs .nav-link.active { color: #1a56db; border-bottom: 2px solid #1a56db; }
    .alert { font-size: .88rem; }
    .otp-input { font-size: 1.6rem; letter-spacing: 10px; text-align: center; font-weight: 700; }
    .step-badge { display: inline-flex; align-items: center; justify-content: center;
                  width: 28px; height: 28px; border-radius: 50%; background: #1a56db;
                  color: #fff; font-size: .78rem; font-weight: 700; flex-shrink: 0; }
    input[type="password"]::placeholder { color: #c9cdd4; opacity: 1; }
  </style>
</head>
<body>
  <div class="auth-card bg-white">
    <div class="brand-header">
      <div class="mb-2"><i class="bi bi-shield-lock-fill" style="font-size:2rem"></i></div>
      <h1>FTDS Customer Portal</h1>
      <p>Fraud-protected transaction banking</p>
    </div>

    <div class="p-4">

      <!-- ── STEP 1: Tab selector (hidden during OTP step) ── -->
      <ul class="nav nav-tabs mb-4" id="authTabs">
        <li class="nav-item flex-fill text-center">
          <button class="nav-link active w-100" data-tab="login">Sign In</button>
        </li>
        <li class="nav-item flex-fill text-center">
          <button class="nav-link w-100" data-tab="register">Create Account</button>
        </li>
      </ul>

      <div id="alertBox" class="alert d-none" role="alert"></div>

      <!-- ── LOGIN FORM ── -->
      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label fw-semibold">Email address</label>
          <input type="email" class="form-control" id="loginEmail" placeholder="you@example.com" required />
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
          <span class="spinner-border spinner-border-sm d-none me-2" id="loginSpinner"></span>
          Sign In
        </button>
      </form>

      <!-- ── REGISTER FORM ── -->
      <form id="registerForm" class="d-none">
        <div class="mb-3">
          <label class="form-label fw-semibold">Full Name</label>
          <input type="text" class="form-control" id="regName" placeholder="Jane Doe" required />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Email address</label>
          <input type="email" class="form-control" id="regEmail" placeholder="you@example.com" required />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Phone Number</label>
          <div class="input-group">
            <select class="form-select flex-grow-0 pe-1" id="regPhoneCode" style="width:130px;font-size:.93rem">
              <option value="+65">🇸🇬 +65</option>
              <option value="+60">🇲🇾 +60</option>
              <option value="+62">🇮🇩 +62</option>
              <option value="+63">🇵🇭 +63</option>
              <option value="+66">🇹🇭 +66</option>
              <option value="+84">🇻🇳 +84</option>
              <option value="+86">🇨🇳 +86</option>
              <option value="+81">🇯🇵 +81</option>
              <option value="+82">🇰🇷 +82</option>
              <option value="+91">🇮🇳 +91</option>
              <option value="+44">🇬🇧 +44</option>
              <option value="+1">🇺🇸 +1</option>
              <option value="+61">🇦🇺 +61</option>
            </select>
            <input type="tel" class="form-control" id="regPhoneNumber" placeholder="9123 4567" required />
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password <span class="text-muted fw-normal">(min. 8 chars)</span></label>
          <input type="password" class="form-control" id="regPassword" placeholder="••••••••" minlength="8" required />
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
          <span class="spinner-border spinner-border-sm d-none me-2" id="registerSpinner"></span>
          Create Account
        </button>
      </form>

      <!-- ── STEP 2: OTP VERIFICATION (shown after successful password login) ── -->
      <div id="otpStep" class="d-none">
        <div class="d-flex align-items-center gap-2 mb-3">
          <span class="step-badge">2</span>
          <span class="fw-semibold">Email Verification</span>
        </div>
        <div class="alert alert-info py-2 small mb-3">
          <i class="bi bi-envelope-fill me-1"></i>
          A 6-digit code was sent to <strong id="otpEmailLabel"></strong>.
          Enter it below to complete sign-in.
        </div>
        <form id="otpForm">
          <div class="mb-3">
            <label class="form-label fw-semibold">Verification Code</label>
            <input type="text" class="form-control otp-input" id="otpCode"
                   maxlength="6" pattern="\d{6}" placeholder="000000"
                   autocomplete="one-time-code" required />
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold mb-2">
            <span class="spinner-border spinner-border-sm d-none me-2" id="otpSpinner"></span>
            <i class="bi bi-check-circle me-1"></i>Verify Code
          </button>
          <button type="button" class="btn btn-link w-100 text-muted small" id="resendBtn">
            Didn't receive it? <span class="text-primary">Resend code</span>
          </button>
          <button type="button" class="btn btn-link w-100 text-muted small" onclick="cancelOtp()">
            ← Back to Sign In
          </button>
        </form>
        <div id="resendMsg" class="text-success text-center small mt-1 d-none">
          <i class="bi bi-check-circle me-1"></i>New code sent!
        </div>
      </div>

      <div class="border-top mt-4 pt-4">
        <div class="d-flex justify-content-between align-items-center gap-3 flex-wrap">
          <div>
            <div class="fw-semibold">Staff access</div>
            <div class="text-muted small">Fraud analysts, managers, and ops users now sign in through the protected staff console.</div>
          </div>
          <a class="btn btn-outline-primary btn-sm" href="staff-login.html">
            <i class="bi bi-person-badge me-1"></i>Staff Sign In
          </a>
        </div>
      </div>

    </div>
  </div>

  <script>
    const API = '/api';
    let pendingEmail = '';   // stored between step 1 and step 2

    // ── Tab switching ────────────────────────────────────────────
    document.querySelectorAll('[data-tab]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-tab]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        document.getElementById('loginForm').classList.toggle('d-none', tab !== 'login');
        document.getElementById('registerForm').classList.toggle('d-none', tab !== 'register');
        hideAlert();
      });
    });

    function showAlert(msg, type = 'danger') {
      const box = document.getElementById('alertBox');
      box.className = `alert alert-${type}`;
      box.textContent = msg;
    }
    function hideAlert() {
      document.getElementById('alertBox').className = 'alert d-none';
    }

    function saveSession(data) {
      localStorage.setItem('ftds_token', data.access_token);
      localStorage.setItem('ftds_customer', JSON.stringify(data.customer));
    }

    // ── Show OTP step ────────────────────────────────────────────
    function showOtpStep(email) {
      pendingEmail = email;
      document.getElementById('authTabs').classList.add('d-none');
      document.getElementById('loginForm').classList.add('d-none');
      document.getElementById('registerForm').classList.add('d-none');
      document.getElementById('otpEmailLabel').textContent = email;
      document.getElementById('otpStep').classList.remove('d-none');
      document.getElementById('otpCode').value = '';
      document.getElementById('otpCode').focus();
      hideAlert();
    }

    function cancelOtp() {
      pendingEmail = '';
      document.getElementById('authTabs').classList.remove('d-none');
      document.getElementById('loginForm').classList.remove('d-none');
      document.getElementById('otpStep').classList.add('d-none');
      hideAlert();
    }

    // ── LOGIN (Step 1) ───────────────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      hideAlert();
      const spinner = document.getElementById('loginSpinner');
      spinner.classList.remove('d-none');
      const email = document.getElementById('loginEmail').value;
      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: document.getElementById('loginPassword').value }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Login failed');
        // Step 2: OTP required
        showOtpStep(email);
      } catch (err) {
        showAlert(err.message);
      } finally {
        spinner.classList.add('d-none');
      }
    });

    // ── OTP VERIFY (Step 2) ──────────────────────────────────────
    document.getElementById('otpForm').addEventListener('submit', async e => {
      e.preventDefault();
      hideAlert();
      const spinner = document.getElementById('otpSpinner');
      spinner.classList.remove('d-none');
      try {
        const res = await fetch(`${API}/auth/verify-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: pendingEmail, otp_code: document.getElementById('otpCode').value }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Verification failed');
        saveSession(data);
        window.location.href = 'banking.html';
      } catch (err) {
        showAlert(err.message);
        document.getElementById('otpCode').value = '';
        document.getElementById('otpCode').focus();
      } finally {
        spinner.classList.add('d-none');
      }
    });

    // ── RESEND OTP ───────────────────────────────────────────────
    document.getElementById('resendBtn').addEventListener('click', async () => {
      document.getElementById('resendMsg').classList.add('d-none');
      try {
        await fetch(`${API}/auth/resend-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: pendingEmail }),
        });
        document.getElementById('resendMsg').classList.remove('d-none');
        setTimeout(() => document.getElementById('resendMsg').classList.add('d-none'), 4000);
      } catch (_) {}
    });

    // ── REGISTER ─────────────────────────────────────────────────
    document.getElementById('registerForm').addEventListener('submit', async e => {
      e.preventDefault();
      hideAlert();
      const spinner = document.getElementById('registerSpinner');
      spinner.classList.remove('d-none');
      try {
        const res = await fetch(`${API}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            full_name: document.getElementById('regName').value,
            email: document.getElementById('regEmail').value,
            phone: document.getElementById('regPhoneCode').value +
                   document.getElementById('regPhoneNumber').value.replace(/[\s\-\(\)]/g, ''),
            password: document.getElementById('regPassword').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Registration failed');
        saveSession(data);
        window.location.href = 'banking.html';
      } catch (err) {
        showAlert(err.message);
      } finally {
        spinner.classList.add('d-none');
      }
    });

    // Redirect if already logged in
    if (localStorage.getItem('ftds_token')) {
      window.location.href = 'banking.html';
    }
  </script>
</body>
</html>
