<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FTDS | Manager Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' fill='%230d9488' viewBox='0 0 16 16'><path d='M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .491.592l-1.5 8A.5.5 0 0 1 13 12H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5M5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4m7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4'/></svg>" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body { background: #f0fdf9; min-height: 100vh; }
    /* ── Login page ── */
    #loginPage { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .auth-card { width: 100%; max-width: 420px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,.12); }
    .brand-header { background: linear-gradient(135deg, #0d9488 0%, #065f46 100%); border-radius: 16px 16px 0 0; padding: 2rem; color: #fff; text-align: center; }
    .brand-header h1 { font-size: 1.5rem; font-weight: 700; margin: 0; letter-spacing: -.5px; }
    .brand-header p  { margin: .3rem 0 0; opacity: .8; font-size: .9rem; }
    /* ── Main app ── */
    #mainPage { display: none; }
    .navbar { background: linear-gradient(135deg, #0d9488 0%, #065f46 100%) !important; }
    /* ── Metric cards ── */
    .metric-card { border-radius: 14px; box-shadow: 0 2px 14px rgba(0,0,0,.08); border: none; transition: transform .15s; }
    .metric-card:hover { transform: translateY(-2px); }
    .metric-icon { font-size: 2rem; opacity: .9; }
    .metric-value { font-size: 2rem; font-weight: 800; line-height: 1; }
    .metric-label { font-size: .82rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; opacity: .7; margin-top: .25rem; }
    .metric-amount { font-size: 1.5rem; font-weight: 800; line-height: 1; }
    .last-updated { font-size: .82rem; color: #6b7280; }
    .alert { font-size: .88rem; }
  </style>
</head>
<body>

<!-- ================================================================
     LOGIN PAGE
================================================================ -->
<div id="loginPage">
  <div class="auth-card bg-white">
    <div class="brand-header">
      <div class="mb-2"><i class="bi bi-bar-chart-line-fill" style="font-size:2rem"></i></div>
      <h1>Manager Dashboard</h1>
      <p>Analytics &amp; Monitoring — FTDS</p>
    </div>
    <div class="p-4">
      <div id="loginAlert" class="alert alert-danger d-none" role="alert"></div>
      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <input type="text" class="form-control" id="loginUsername" placeholder="manager" required autocomplete="username" />
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn w-100 py-2 fw-semibold text-white" style="background:#0d9488">
          <span class="spinner-border spinner-border-sm d-none me-2" id="loginSpinner"></span>
          <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
        </button>
      </form>
    </div>
  </div>
</div>

<!-- ================================================================
     MAIN APP
================================================================ -->
<div id="mainPage">

  <!-- Navbar -->
  <nav class="navbar navbar-dark px-4 py-2">
    <span class="navbar-brand fw-bold fs-5">
      <i class="bi bi-bar-chart-line-fill me-2"></i>Manager Dashboard
    </span>
    <div class="d-flex align-items-center gap-2">
      <a href="http://localhost:3000" target="_blank" class="btn btn-outline-light btn-sm">
        <i class="bi bi-graph-up-arrow me-1"></i>Open Grafana
      </a>
      <button class="btn btn-outline-light btn-sm" onclick="logout()">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </button>
    </div>
  </nav>

  <div class="container-fluid px-4 py-4">

    <!-- Header row -->
    <div class="d-flex align-items-center justify-content-between mb-4">
      <div>
        <h5 class="fw-bold mb-0" style="color:#065f46">Analytics Overview</h5>
        <div class="last-updated mt-1">
          <span id="lastUpdatedText">—</span>
          <span class="spinner-border spinner-border-sm ms-2 d-none" id="refreshSpinner" style="color:#0d9488"></span>
        </div>
      </div>
      <div class="d-flex align-items-center gap-2">
        <span class="text-muted small" id="refreshCountdown"></span>
        <button class="btn btn-sm text-white" style="background:#0d9488" onclick="loadDashboard()">
          <i class="bi bi-arrow-clockwise me-1"></i>Refresh
        </button>
      </div>
    </div>

    <!-- Alert -->
    <div id="mainAlert" class="alert d-none" role="alert"></div>

    <!-- Metric cards grid -->
    <div class="row g-3" id="metricsGrid">
      <!-- populated by JS -->
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const API = '/api/analytics';
  const TOKEN_KEY = 'manager_token';

  let _autoRefreshTimer = null;
  let _countdown = 30;

  // ── Auth helpers ─────────────────────────────────────────────────
  function getToken() { return sessionStorage.getItem(TOKEN_KEY); }
  function setToken(t) { sessionStorage.setItem(TOKEN_KEY, t); }
  function clearToken() { sessionStorage.removeItem(TOKEN_KEY); }
  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` };
  }

  // ── Page init ────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    if (getToken()) {
      showMain();
    }
  });

  function showMain() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('mainPage').style.display  = 'block';
    loadDashboard();
    startAutoRefresh();
  }

  function logout() {
    clearToken();
    stopAutoRefresh();
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('mainPage').style.display  = 'none';
    document.getElementById('loginAlert').classList.add('d-none');
  }

  // ── Auto-refresh ─────────────────────────────────────────────────
  function startAutoRefresh() {
    _countdown = 30;
    updateCountdown();
    _autoRefreshTimer = setInterval(() => {
      _countdown--;
      if (_countdown <= 0) {
        _countdown = 30;
        loadDashboard();
      }
      updateCountdown();
    }, 1000);
  }

  function stopAutoRefresh() {
    if (_autoRefreshTimer) clearInterval(_autoRefreshTimer);
  }

  function updateCountdown() {
    const el = document.getElementById('refreshCountdown');
    if (el) el.textContent = `Auto-refresh in ${_countdown}s`;
  }

  // ── Alert helpers ────────────────────────────────────────────────
  function showMainAlert(msg, type = 'danger') {
    const el = document.getElementById('mainAlert');
    el.className = `alert alert-${type}`;
    el.textContent = msg;
  }
  function hideMainAlert() {
    document.getElementById('mainAlert').className = 'alert d-none';
  }

  // ── Metric card definitions ───────────────────────────────────────
  const METRIC_DEFS = [
    {
      key:    'transactions_approved',
      label:  'Total Approved',
      icon:   'bi-check-circle-fill',
      bg:     '#dcfce7',
      color:  '#15803d',
    },
    {
      key:    'transactions_rejected',
      label:  'Total Rejected',
      icon:   'bi-x-circle-fill',
      bg:     '#fee2e2',
      color:  '#b91c1c',
    },
    {
      key:    'transactions_flagged',
      label:  'Flagged for Review',
      icon:   'bi-flag-fill',
      bg:     '#fef9c3',
      color:  '#b45309',
    },
    {
      key:    'transactions_reviewed',
      label:  'Manually Reviewed',
      icon:   'bi-person-check-fill',
      bg:     '#dbeafe',
      color:  '#1d4ed8',
    },
    {
      key:    'appeals_created',
      label:  'Appeals Created',
      icon:   'bi-chat-left-text-fill',
      bg:     '#ffedd5',
      color:  '#c2410c',
    },
    {
      key:    'appeals_approved',
      label:  'Appeals Approved',
      icon:   'bi-patch-check-fill',
      bg:     '#dcfce7',
      color:  '#15803d',
    },
    {
      key:    'appeals_rejected',
      label:  'Appeals Rejected',
      icon:   'bi-patch-minus-fill',
      bg:     '#fee2e2',
      color:  '#b91c1c',
    },
    {
      key:    'total_approved_amount',
      label:  'Total Approved Amount',
      icon:   'bi-currency-dollar',
      bg:     '#dcfce7',
      color:  '#15803d',
      amount: true,
    },
    {
      key:    'total_rejected_amount',
      label:  'Total Rejected Amount',
      icon:   'bi-currency-dollar',
      bg:     '#fee2e2',
      color:  '#b91c1c',
      amount: true,
    },
  ];

  function fmtAmount(v) {
    return '$' + Number(v).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function renderMetrics(data) {
    const grid = document.getElementById('metricsGrid');
    grid.innerHTML = METRIC_DEFS.map(def => {
      const raw = data[def.key] ?? 0;
      const val = def.amount ? fmtAmount(raw) : raw.toLocaleString();
      return `
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="metric-card card p-4" style="background:${def.bg}">
            <div class="d-flex align-items-start justify-content-between">
              <div>
                <div class="${def.amount ? 'metric-amount' : 'metric-value'}" style="color:${def.color}">${val}</div>
                <div class="metric-label" style="color:${def.color}">${def.label}</div>
              </div>
              <i class="bi ${def.icon} metric-icon" style="color:${def.color}"></i>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  // ── Load dashboard ───────────────────────────────────────────────
  async function loadDashboard() {
    const spinner = document.getElementById('refreshSpinner');
    spinner.classList.remove('d-none');
    hideMainAlert();
    try {
      const res = await fetch(`${API}/dashboard`, { headers: authHeaders() });
      if (res.status === 401) { logout(); return; }
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      renderMetrics(data);
      const ts = data.updated_at ? new Date(data.updated_at).toLocaleString() : new Date().toLocaleString();
      document.getElementById('lastUpdatedText').textContent = `Last updated: ${ts}`;
    } catch (err) {
      showMainAlert('Failed to load dashboard: ' + err.message);
    } finally {
      spinner.classList.add('d-none');
    }
  }

  // ── Login form ───────────────────────────────────────────────────
  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const alertEl = document.getElementById('loginAlert');
    const spinner = document.getElementById('loginSpinner');
    alertEl.classList.add('d-none');
    spinner.classList.remove('d-none');
    try {
      const res = await fetch(`${API}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('loginUsername').value,
          password: document.getElementById('loginPassword').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Login failed');
      setToken(data.access_token);
      showMain();
    } catch (err) {
      alertEl.textContent = err.message;
      alertEl.classList.remove('d-none');
    } finally {
      spinner.classList.add('d-none');
    }
  });
</script>
</body>
</html>
