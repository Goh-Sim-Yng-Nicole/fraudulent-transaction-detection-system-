x-otel-env: &otel-env
  OTEL_ENABLED: ${OTEL_ENABLED:-true}
  OTEL_SERVICE_NAMESPACE: ${OTEL_SERVICE_NAMESPACE:-ftds-platform}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
  OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
  OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-parentbased_traceidratio}
  OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-1.0}
  OTEL_PROPAGATORS: ${OTEL_PROPAGATORS:-tracecontext,baggage}

services:
  postgres-customer:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_CUSTOMER_DB:-ftds_customer}
      POSTGRES_USER: ${POSTGRES_CUSTOMER_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_CUSTOMER_PASSWORD:-postgres}
    ports:
      - "5435:5432"
    volumes:
      - ftds_postgres_customer_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-transaction:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_TRANSACTION_DB:-ftds_transaction}
      POSTGRES_USER: ${POSTGRES_TRANSACTION_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_TRANSACTION_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - ftds_postgres_transaction_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-appeal:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_APPEAL_DB:-ftds_appeal}
      POSTGRES_USER: ${POSTGRES_APPEAL_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_APPEAL_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - ftds_postgres_appeal_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-fraud-review:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_FRAUD_REVIEW_DB:-ftds_fraud_review}
      POSTGRES_USER: ${POSTGRES_FRAUD_REVIEW_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_FRAUD_REVIEW_PASSWORD:-postgres}
    ports:
      - "5434:5432"
    volumes:
      - ftds_postgres_fraud_review_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-audit:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_AUDIT_DB:-ftds_audit}
      POSTGRES_USER: ${POSTGRES_AUDIT_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_AUDIT_PASSWORD:-postgres}
    ports:
      - "5437:5432"
    volumes:
      - ftds_postgres_audit_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20

  mailpit:
    image: axllent/mailpit:v1.26
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"

  kafka-init:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      rpk topic create transaction.created --brokers redpanda:9092 --partitions 1 --replicas 1 2>/dev/null || true;
      rpk topic create transaction.scored --brokers redpanda:9092 --partitions 1 --replicas 1 2>/dev/null || true;
      rpk topic create transaction.flagged --brokers redpanda:9092 --partitions 1 --replicas 1 2>/dev/null || true;
      rpk topic create transaction.finalised --brokers redpanda:9092 --partitions 1 --replicas 1 2>/dev/null || true;
      rpk topic create transaction.reviewed --brokers redpanda:9092 --partitions 1 --replicas 1 2>/dev/null || true;
      rpk topic create appeal.created --brokers redpanda:9092 --partitions 1 --replicas 1 2>/dev/null || true;
      rpk topic create appeal.resolved --brokers redpanda:9092 --partitions 1 --replicas 1 2>/dev/null || true;
      echo "[kafka-init] ok"

  transaction:
    build:
      context: .
      dockerfile: services/transaction/Dockerfile
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_TRANSACTION_USER:-postgres}:${POSTGRES_TRANSACTION_PASSWORD:-postgres}@postgres-transaction:5432/${POSTGRES_TRANSACTION_DB:-ftds_transaction}
      CUSTOMER_BASE_URL: http://customer:8005
    ports:
      - "8000:8000"
    depends_on:
      redpanda:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      postgres-transaction:
        condition: service_healthy
      transaction-migrate:
        condition: service_completed_successfully

  transaction-migrate:
    build:
      context: .
      dockerfile: services/transaction/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_TRANSACTION_USER:-postgres}:${POSTGRES_TRANSACTION_PASSWORD:-postgres}@postgres-transaction:5432/${POSTGRES_TRANSACTION_DB:-ftds_transaction}
    command: ["node", "src/db/migrate.js"]
    restart: on-failure
    depends_on:
      postgres-transaction:
        condition: service_healthy

  fraud-score:
    build:
      context: .
      dockerfile: services/fraud_score/Dockerfile
    env_file: .env
    ports:
      - "8001:8001"

  detect-fraud:
    build:
      context: .
      dockerfile: services/detect_fraud/Dockerfile
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      FRAUD_SCORE_URL: http://fraud-score:8001/score
    ports:
      - "8008:8008"
    depends_on:
      redpanda:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      fraud-score:
        condition: service_started

  fraud-review:
    build:
      context: ./services/process_flagged_appeals
      dockerfile: Dockerfile
    env_file: .env
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: fraud-review
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_FRAUD_REVIEW_USER:-postgres}:${POSTGRES_FRAUD_REVIEW_PASSWORD:-postgres}@postgres-fraud-review:5432/${POSTGRES_FRAUD_REVIEW_DB:-ftds_fraud_review}
      ANALYST_USERNAME: ${ANALYST_USERNAME:-analyst}
      ANALYST_PASSWORD: ${ANALYST_PASSWORD:-analyst123}
      ANALYST_JWT_SECRET: ${ANALYST_JWT_SECRET:-analyst-dev-secret-change-in-prod}
      APPEAL_BASE_URL: http://appeal:8003
    ports:
      - "8002:8002"
    depends_on:
      redpanda:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      postgres-fraud-review:
        condition: service_healthy
      fraud-review-migrate:
        condition: service_completed_successfully

  fraud-review-migrate:
    build:
      context: ./services/process_flagged_appeals
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_FRAUD_REVIEW_USER:-postgres}:${POSTGRES_FRAUD_REVIEW_PASSWORD:-postgres}@postgres-fraud-review:5432/${POSTGRES_FRAUD_REVIEW_DB:-ftds_fraud_review}
    command: ["npm", "run", "migrate"]
    depends_on:
      postgres-fraud-review:
        condition: service_healthy

  appeal:
    build:
      context: ./services/appeal
      dockerfile: Dockerfile
    env_file: .env
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: appeal
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      DATABASE_URL: postgresql://${POSTGRES_APPEAL_USER:-postgres}:${POSTGRES_APPEAL_PASSWORD:-postgres}@postgres-appeal:5432/${POSTGRES_APPEAL_DB:-ftds_appeal}
      TRANSACTION_BASE_URL: http://transaction:8000
    ports:
      - "8003:8003"
    depends_on:
      redpanda:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      postgres-appeal:
        condition: service_healthy
      appeal-migrate:
        condition: service_completed_successfully

  appeal-migrate:
    build:
      context: ./services/appeal
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_APPEAL_USER:-postgres}:${POSTGRES_APPEAL_PASSWORD:-postgres}@postgres-appeal:5432/${POSTGRES_APPEAL_DB:-ftds_appeal}
    command: ["npm", "run", "migrate"]
    depends_on:
      postgres-appeal:
        condition: service_healthy

  notification:
    build:
      context: ./services/notification
      dockerfile: Dockerfile
    env_file: .env
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: notification
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      TRANSACTION_BASE_URL: http://transaction:8000
      CUSTOMER_BASE_URL: http://customer:8005
      EMAIL_ENABLED: ${EMAIL_ENABLED:-true}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
      EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST:-mailpit}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-1025}
      EMAIL_SMTP_SECURE: ${EMAIL_SMTP_SECURE:-false}
      EMAIL_SMTP_USER: ${EMAIL_SMTP_USER:-}
      EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD:-}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-alerts@ftds.local}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-FTDS Notifications}
      SMS_ENABLED: ${SMS_ENABLED:-false}
      NOTIFY_ON_FLAGGED: "true"
      FLAGGED_NOTIFY_FRAUD_TEAM_EMAIL: "true"
    ports:
      - "8010:8010"
    depends_on:
      redpanda:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      transaction:
        condition: service_started
      customer:
        condition: service_started
      mailpit:
        condition: service_started

  audit:
    build:
      context: ./services/audit/audit
      dockerfile: Dockerfile
    env_file: .env
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: audit
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      DATABASE_URL: postgresql://${POSTGRES_AUDIT_USER:-postgres}:${POSTGRES_AUDIT_PASSWORD:-postgres}@postgres-audit:5432/${POSTGRES_AUDIT_DB:-ftds_audit}
    ports:
      - "8007:8007"
    depends_on:
      redpanda:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      postgres-audit:
        condition: service_healthy
      audit-migrate:
        condition: service_completed_successfully

  audit-migrate:
    build:
      context: ./services/audit/audit
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_AUDIT_USER:-postgres}:${POSTGRES_AUDIT_PASSWORD:-postgres}@postgres-audit:5432/${POSTGRES_AUDIT_DB:-ftds_audit}
    command: ["npm", "run", "migrate"]
    depends_on:
      postgres-audit:
        condition: service_healthy

  analytics:
    build:
      context: ./services/analytics/analytics
      dockerfile: Dockerfile
    env_file: .env
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: analytics
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      MANAGER_USERNAME: ${MANAGER_USERNAME:-manager}
      MANAGER_PASSWORD: ${MANAGER_PASSWORD:-manager123}
      MANAGER_JWT_SECRET: ${MANAGER_JWT_SECRET:-manager-dev-secret-change-in-prod}
      REDIS_DISABLED: "true"
    ports:
      - "8006:8006"
    depends_on:
      redpanda:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  customer:
    build:
      context: .
      dockerfile: services/customer/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_CUSTOMER_USER:-postgres}:${POSTGRES_CUSTOMER_PASSWORD:-postgres}@postgres-customer:5432/${POSTGRES_CUSTOMER_DB:-ftds_customer}
      SMTP_HOST: ${CUSTOMER_SMTP_HOST:-mailpit}
      SMTP_PORT: ${CUSTOMER_SMTP_PORT:-1025}
      SMTP_USER: ${CUSTOMER_SMTP_USER:-}
      SMTP_PASSWORD: ${CUSTOMER_SMTP_PASSWORD:-}
      SMTP_FROM: ${CUSTOMER_SMTP_FROM:-banking@ftds.local}
      SMTP_STARTTLS: ${CUSTOMER_SMTP_STARTTLS:-false}
    ports:
      - "8005:8005"
    depends_on:
      postgres-customer:
        condition: service_healthy
      customer-migrate:
        condition: service_completed_successfully

  customer-migrate:
    build:
      context: .
      dockerfile: services/customer/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_CUSTOMER_USER:-postgres}:${POSTGRES_CUSTOMER_PASSWORD:-postgres}@postgres-customer:5432/${POSTGRES_CUSTOMER_DB:-ftds_customer}
    command: ["python", "-m", "services.customer.migrate"]
    depends_on:
      postgres-customer:
        condition: service_healthy

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    env_file: .env
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: gateway
      TRANSACTION_BASE_URL: http://transaction:8000
      FRAUD_REVIEW_BASE_URL: http://fraud-review:8002
      APPEAL_BASE_URL: http://appeal:8003
      CUSTOMER_BASE_URL: http://customer:8005
      REDIS_DISABLED: "true"
      METRICS_ENABLED: "true"
      METRICS_PORT: 9090
    ports:
      - "8004:8004"
    depends_on:
      transaction:
        condition: service_started
      fraud-review:
        condition: service_started
      appeal:
        condition: service_started
      customer:
        condition: service_started

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "8088:8088"
    depends_on:
      gateway:
        condition: service_started
      customer:
        condition: service_started

  kong:
    image: kong:3.6
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_LOG_LEVEL: warn
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "80:8000"
      - "8090:8001"
    depends_on:
      nginx:
        condition: service_started
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.121.0
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
    depends_on:
      - jaeger
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "validate", "--config=/etc/otel-collector-config.yml"]
      interval: 15s
      timeout: 5s
      retries: 3

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "9091:8080"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ftds_prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - cadvisor
      - otel-collector

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.14.0
    ports:
      - "16686:16686"
    command:
      - "--set=extensions.jaeger_query.ui.config_file=/etc/jaeger/ui-config.json"
      - "--set=extensions.jaeger_storage.metric_backends.prometheus_backend.prometheus.endpoint=http://prometheus:9090"
      - "--set=extensions.jaeger_storage.metric_backends.prometheus_backend.prometheus.normalize_calls=true"
      - "--set=extensions.jaeger_storage.metric_backends.prometheus_backend.prometheus.normalize_duration=true"
      - "--set=extensions.jaeger_storage.metric_backends.prometheus_backend.prometheus.metric_namespace="
      - "--set=extensions.jaeger_storage.metric_backends.prometheus_backend.prometheus.latency_unit=ms"
      - "--set=extensions.jaeger_query.storage.metrics=prometheus_backend"
    volumes:
      - ./jaeger/ui-config.json:/etc/jaeger/ui-config.json:ro

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/fraud-detection.json
    volumes:
      - ftds_grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  ftds_postgres_transaction_data:
  ftds_postgres_appeal_data:
  ftds_postgres_fraud_review_data:
  ftds_postgres_customer_data:
  ftds_postgres_audit_data:
  ftds_prometheus_data:
  ftds_grafana_data:
